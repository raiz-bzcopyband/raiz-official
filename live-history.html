<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>過去のライブ動画 - Rai'z</title>

    <style>
        body {
            margin: 0;
            background: url("images/top/back.png") no-repeat center center fixed;
            background-size: cover;
            color: #fff;
            font-family: 'Noto Sans JP', sans-serif;
        }

        header img {
            width: 50%;
            height: auto;
            display: block;
            margin: 0 auto;
        }

        .year-block {
            background-color: rgba(0, 0, 0, 0.8);
            padding: 20px;
            margin: 30px auto;
            width: 50%;
            border-radius: 8px;
            text-align: left;

            border-left: 6px solid transparent;
            background-image:
                linear-gradient(to bottom, #fefefe, #c0c0c0 40%, #8c8c8c 60%, #e0e0e0);
            background-repeat: no-repeat;
            background-size: 6px 100%;
            background-position: left top;
            box-shadow: inset 1px 0 1px #fff;
        }

        .year-block h2 {
            font-size: 26px;
            color: #ffcccc;
            margin: 0 0 10px 0;
        }

        .year-block p {
            font-size: 20px;
            margin: 10px 0;
            line-height: 1.6;
        }

        .back-button {
            display: inline-block;
            margin: 40px auto;
            padding: 12px 25px;
            border-radius: 8px;
            border: 2px solid #66b3ff;
            text-decoration: none;
            font-size: 22px;
            font-weight: bold;
            color: #66b3ff;

            text-shadow:
                1px 1px 0 #fff,
                -1px 1px 0 #fff,
                1px -1px 0 #fff,
                -1px -1px 0 #fff;

            background-color: rgba(0,0,0,0.7);
        }

        .back-area {
            text-align: center;
        }

        .blue-link {
            color: #4da3ff;
            text-decoration: underline;
            font-size: 20px;
            font-weight: bold;
            text-shadow:
                1px 1px 0 #fff,
                -1px 1px 0 #fff,
                1px -1px 0 #fff,
                -1px -1px 0 #fff;
        }

        @media (max-width: 768px) {
            .year-block {
                width: 90%;
                padding: 15px;
            }

            header img {
                width: 90%;
            }

            .back-button {
                font-size: 20px;
                padding: 10px 20px;
            }
        }
    </style>
</head>

<body>

    <header>
        <img src="images/top/title.png" alt="Rai'z（ライズ）タイトル画像">
    </header>

    <section class="year-block">
        <h2>2026年 ライブ情報</h2>

        <p>●2026.10.12 J-POPオムニバス＆B'zコピバンSP</p>

        <p>
            <a href="" class="blue-link">
                ▶ 動画準備中
            </a>
        </p>
    </section>

    <div class="back-area">
        <a href="index.html" class="back-button">▶ トップ画面に戻る</a>
    </div>

</body>
</html>
